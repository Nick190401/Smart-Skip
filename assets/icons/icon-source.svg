<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#111120"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>

    <!-- Icon fill gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5b9bff"/>
      <stop offset="100%" stop-color="#b09dff"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner shadow on background -->
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="shadow"/>
      <feComposite in="shadow" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="innerShadow"/>
      <feFlood flood-color="#4f6fff" flood-opacity="0.10" result="color"/>
      <feComposite in="color" in2="innerShadow" operator="in" result="coloredShadow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="coloredShadow"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle top-left blue tint -->
  <radialGradient id="tint" cx="20%" cy="20%" r="60%">
    <stop offset="0%"   stop-color="#4f8ef7" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" fill="url(#tint)"/>

  <!-- Skip-forward icon: two triangles + end bar -->
  <!-- All shapes share same vertical span: y=155 to y=357 (202px tall), center y=256 -->

  <!-- Left triangle  (x: 134→228, pointing right) -->
  <path d="M134 155 L134 357 L228 256 Z" fill="url(#iconGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Right triangle (x: 242→336, pointing right) -->
  <path d="M242 155 L242 357 L336 256 Z" fill="url(#iconGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- End bar (x: 350→378) -->
  <rect x="350" y="155" width="28" height="202" rx="9" fill="url(#iconGrad)" filter="url(#glow)" opacity="0.95"/>
</svg>
